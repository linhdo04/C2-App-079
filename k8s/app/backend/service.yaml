apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: c2-app
  labels:
    app.kubernetes.io/name: backend
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "backend-health"}'
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: backend-health
  namespace: c2-app
spec:
  timeoutSec: 60
  connectionDraining:
    drainingTimeoutSec: 30
  healthCheck:
    type: HTTP
    requestPath: /api/health
    port: 8000
