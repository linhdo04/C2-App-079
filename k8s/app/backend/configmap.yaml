apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: c2-app
data:
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  AGENT_CHECKPOINTING_ENABLED: "True"
  AGENT_CHECKPOINT_DURABILITY: "sync"
  AGENT_FALLBACK_ROUTER_TIMEOUT_SECONDS: "15"
  AGENT_GUARDRAILS_BLOCK_PROMPT_INJECTION: "True"
  AGENT_GUARDRAILS_BLOCK_SECRETS: "True"
  AGENT_GUARDRAILS_ENABLED: "True"
  AGENT_GUARDRAILS_REDACT_PII: "True"
  AGENT_INTENT_ROUTER_ENABLED: "True"
  AGENT_INTENT_ROUTER_MIN_CONFIDENCE: "0.65"
  AGENT_INTENT_ROUTER_TIMEOUT_SECONDS: "3"
  AGENT_LLM_MAX_RETRIES: "0"
  AGENT_LLM_RETRY_BACKOFF_SECONDS: "0.5"
  AGENT_LLM_TIMEOUT_SECONDS: "60"
  AGENT_MAX_ITERATIONS: "6"
  AGENT_MEMORY_MAX_CHARACTERS: "12000"
  AGENT_MEMORY_MAX_MESSAGES: "10"
  AGENT_SEARCH_FILTER_ENABLED: "True"
  AGENT_SEARCH_FILTER_TIMEOUT_SECONDS: "12"
  AGENT_TOOL_MAX_RETRIES: "1"
  AGENT_TOOL_RETRY_BACKOFF_SECONDS: "0.25"
  AGENT_TOOL_TIMEOUT_SECONDS: "60"
  AI_LOG_DIR: ".ai-log"
  AI_LOG_SERVER: "https://ai-logs.note.transformerlabs.ai/api/ingest"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_PREFIX: "/api"
  APP_DEBUG: "False"
  APP_DOMAIN: "api.docker-linhdt.site"
  APP_ENV: "production"
  APP_NAME: "Autonomous Drones"
  DEEPSEEK_API_BASE: "https://api.deepseek.com"
  DEFAULT_MODEL: "deepseek-v4-flash"
  FRONTEND_ORIGIN: "https://docker-linhdt.site"
  JWT_ALGORITHM: "HS256"
  LANGGRAPH_CHECKPOINT_SETUP_ON_START: "True"
  LANGSMITH_ENDPOINT: "https://eu.api.smith.langchain.com"
  LANGSMITH_PROJECT: "c2_app_production"
  LANGSMITH_TRACING: "true"
  LLM_PROVIDER: "deepseek"
  LOG_LEVEL: "INFO"
  POSTGRES_DB: "appdb"
  POSTGRES_HOST: "10.240.0.3"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "appuser"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REFRESH_TOKEN_EXPIRE_DAYS: "30"
