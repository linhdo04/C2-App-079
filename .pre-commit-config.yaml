repos:
  - repo: local
    hooks:
      - id: backend-make-check
        name: backend make check
        entry: bash -c "cd backend && make check"
        language: system
        pass_filenames: false
        files: ^backend/

      - id: frontend-lint
        name: frontend lint
        entry: bash -c "cd frontend && pnpm lint && pnpm format"
        language: system
        pass_filenames: false
        files: ^frontend/