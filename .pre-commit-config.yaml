repos:
  - repo: local
    hooks:
      - id: backend-make-check
        name: backend make check
        entry: bash -c "cd backend && make check"
        language: system
        pass_filenames: false
        files: ^backend/

      - id: frontend-check
        name: frontend check
        entry: bash -c "cd frontend && bun lint:check && bun format:check"
        language: system
        pass_filenames: false
        files: ^frontend/
