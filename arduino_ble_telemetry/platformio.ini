[platformio]
default_envs = esp32devkit-v1-node

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200

[env:esp32devkit-v1-node]
board = esp32doit-devkit-v1
build_src_filter = +<node_main.cpp> -<gateway_main.cpp>
lib_deps = adafruit/DHT sensor library@1.4.6

[env:esp32-s3-gateway]
board = esp32-s3-devkitc-1
build_src_filter = +<gateway_main.cpp> -<node_main.cpp>
