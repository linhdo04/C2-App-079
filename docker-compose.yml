services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - database
      - cache

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend

  database:
    image: postgres:14.23-alpine
    container_name: postgres_c2_app
    env_file:
      - ./backend/.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cache:
    image: redis:8.6.4-alpine
    container_name: redis_c2_app
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: "redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --appendonly yes"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
