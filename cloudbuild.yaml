steps:
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/backend:${_IMAGE_TAG}
      - backend

  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}
      - --tag
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend:${_IMAGE_TAG}
      - frontend

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/backend:${_IMAGE_TAG}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend:${_IMAGE_TAG}

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: asia-southeast1
  _REPOSITORY: c2-app
  _IMAGE_TAG: manual
  _NEXT_PUBLIC_API_URL: https://docker-linhdt.site/api

timeout: 1800s
